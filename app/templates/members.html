{% extends "base.html" %}

{% block content %}
<h2 class="text-2xl font-bold mb-6">Members List</h2>

<div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow overflow-x-auto">
    <table class="w-full text-left">
        <thead>
            <tr class="border-b dark:border-gray-700">
                <th class="pb-2">ID</th>
                <th class="pb-2">Full Name</th>
                <th class="pb-2">Age</th>
                <th class="pb-2">Gender</th>
                <th class="pb-2">Membership</th>
                <th class="pb-2">Join Date</th>
                <th class="pb-2">Last Visit</th>
            </tr>
        </thead>
        <tbody>
            {% for member in members %}
            <tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700">
                <td class="py-2">{{ member[0] }}</td>
                <td class="py-2">{{ member[1] }}</td>
                <td class="py-2">{{ member[2] }}</td>
                <td class="py-2">{{ member[3] }}</td>
                <td class="py-2">{{ member[4] }}</td>
                <td class="py-2">{{ member[5] }}</td>
                <td class="py-2">{{ member[6] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
