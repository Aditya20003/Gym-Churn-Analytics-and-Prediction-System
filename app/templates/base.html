<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gym Churn Analytics</title>

    <!-- TAILWIND CONFIG -->
    <script>
        window.tailwind = {
            config: {
                darkMode: "class"
            }
        };
    </script>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Initialize theme on page load -->
    <script>
        function initTheme() {
            // Get saved theme or default to light
            let theme = localStorage.getItem("theme");
            if (!theme) {
                theme = "light";
                localStorage.setItem("theme", "light");
            }

            // Apply theme
            if (theme === "dark") {
                document.documentElement.classList.add("dark");
            } else {
                document.documentElement.classList.remove("dark");
            }
        }

        // Initialize before page renders
        initTheme();
    </script>
</head>

<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">

<!-- NAVBAR -->
<nav class="bg-white dark:bg-black text-gray-900 dark:text-white px-6 py-4 flex justify-between items-center border-b border-gray-200 dark:border-gray-800 transition-colors duration-300">
    <div class="flex items-center space-x-2">
        <i class="fa-solid fa-dumbbell text-yellow-400"></i>
        <span class="text-xl font-bold">Gym Analytics</span>
    </div>

    <div class="flex items-center space-x-6 text-sm font-semibold">
        <a href="/" class="hover:text-yellow-500 dark:hover:text-yellow-400">Home</a>
        <a href="/members" class="hover:text-yellow-500 dark:hover:text-yellow-400">Members</a>
        <a href="/add-member" class="hover:text-yellow-500 dark:hover:text-yellow-400">Add Member</a>
        <a href="/add-attendance" class="hover:text-yellow-500 dark:hover:text-yellow-400">Attendance</a>
        <a href="/churn-dashboard" class="hover:text-yellow-500 dark:hover:text-yellow-400">Churn</a>
        <a href="/churn-predictions" class="hover:text-yellow-500 dark:hover:text-yellow-400">Predictions</a>

        <!-- Theme Toggle -->
        <button onclick="toggleTheme()"
                id="themeToggle"
                class="ml-4 px-3 py-1 rounded bg-gray-200 text-gray-900 hover:bg-gray-300 dark:bg-gray-700 dark:text-white dark:hover:bg-gray-600 transition">
            🌙
        </button>
    </div>
</nav>

<!-- CONTENT -->
<div class="p-8 transition-colors duration-300">
    {% block content %}{% endblock %}
</div>

<!-- THEME SCRIPT -->
<script>
    function updateThemeIcon() {
        const toggleBtn = document.getElementById("themeToggle");
        if (toggleBtn) {
            const isDark = document.documentElement.classList.contains("dark");
            toggleBtn.textContent = isDark ? "☀️" : "🌙";
        }
    }

    function toggleTheme() {
        const html = document.documentElement;
        const isDark = html.classList.contains("dark");

        if (isDark) {
            // Switch to light mode
            html.classList.remove("dark");
            localStorage.setItem("theme", "light");
        } else {
            // Switch to dark mode
            html.classList.add("dark");
            localStorage.setItem("theme", "dark");
        }

        updateThemeIcon();
    }

    // Update icon on page load
    document.addEventListener("DOMContentLoaded", updateThemeIcon);
</script>

</body>
</html>
