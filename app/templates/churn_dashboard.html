{% extends "base.html" %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl font-bold">Churn Dashboard</h2>
</div>

<div class="bg-white dark:bg-gray-800 p-6 rounded-xl shadow overflow-x-auto">
    <table class="w-full text-left">
        <thead>
            <tr class="border-b dark:border-gray-700">
                <th class="pb-2">Name</th>
                <th class="pb-2">Last Visit</th>
                <th class="pb-2">Churn Status</th>
            </tr>
        </thead>
        <tbody>
            {% for m in members %}
            <tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700">
                <td class="py-2">{{ m[0] }}</td>
                <td class="py-2">{{ m[1] }}</td>
                <td class="py-2">
                    {% if m[2] == 1 %}
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-300">Churned</span>
                    {% else %}
                        <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-300">Active</span>
                    {% endif %}
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
