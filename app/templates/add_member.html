{% extends "base.html" %}

{% block content %}
<h2 class="text-2xl font-bold mb-6">Add New Member</h2>

<div class="max-w-xl bg-white dark:bg-gray-800 p-6 rounded-xl shadow">
    <form method="POST" class="space-y-4">

        <div>
            <label class="block text-sm font-medium">Full Name</label>
            <input type="text" name="full_name" required
                   class="w-full mt-1 p-2 rounded border dark:bg-gray-700 dark:border-gray-600">
        </div>

        <div>
            <label class="block text-sm font-medium">Age</label>
            <input type="number" name="age" required
                   class="w-full mt-1 p-2 rounded border dark:bg-gray-700 dark:border-gray-600">
        </div>

        <div>
            <label class="block text-sm font-medium">Gender</label>
            <select name="gender"
                    class="w-full mt-1 p-2 rounded border dark:bg-gray-700 dark:border-gray-600">
                <option value="M">Male</option>
                <option value="F">Female</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium">Membership Type</label>
            <select name="membership_type"
                    class="w-full mt-1 p-2 rounded border dark:bg-gray-700 dark:border-gray-600">
                <option value="monthly">Monthly</option>
                <option value="quarterly">Quarterly</option>
                <option value="yearly">Yearly</option>
            </select>
        </div>

        <div>
            <label class="block text-sm font-medium">Join Date</label>
            <input type="date" name="join_date" required
                   class="w-full mt-1 p-2 rounded border dark:bg-gray-700 dark:border-gray-600">
        </div>

        <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">
            Add Member
        </button>
    </form>
</div>
{% endblock %}
